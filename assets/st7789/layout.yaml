        x: "album_artist.left"
        y: "album_artist.bottom+3"
        width: "album_artist.width"
        height: "album_artist.height"
        font: font_7x13
        fg_color: Orange
        scrollable: true
      - name: title
        type: scrolling_text
        x: "album_artist.left"
        y: "album.bottom+3"
        width: "album_artist.width"
        height: "album_artist.height"
        font: font_7x13
        fg_color: Orange
        scrollable: true
      - name: artist
        type: scrolling_text
        x: "album_artist.left"
        y: "title.bottom+3"
        width: "album_artist.width"
        height: "album_artist.height"
        font: font_7x13
        fg_color: Orange
        scrollable: true
      - name: year
