  # Current weather — 140×140 SVG icon left, all data in right column,
  # conditions as a full-width strip at the bottom of the display.
  weather_current_main:
    fields:
      # SVG icon — 140×140 vertically centered
      - name: weather_icon
        type: weather_icon
        x: "0"
        y: "15"
        width: "140"
        height: "140"
      # Metric rows — 20×20 glyphs, font_7x13_bold text, 26px pitch
      - name: temp_glyph
        type: weather_glyph
        x: "weather_icon.right + 2"
        y: "6"
        width: "20"
        height: "20"
        fg_color: Cyan
      - name: temperature
        type: label
        x: "temp_glyph.right + 2"
        y: "temp_glyph.top"
        width: "parent.width - temp_glyph.right - 2"
        height: "14"
        font: font_7x13_bold
        fg_color: Cyan
      - name: humidity_glyph
        type: weather_glyph
        x: "temp_glyph.left"
        y: "temp_glyph.bottom + 2"
        width: "20"
        height: "20"
        fg_color: Cyan
