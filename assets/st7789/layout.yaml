        height: "11"
        font: font_6x10
        fg_color: Cyan
      - name: pressure_glyph
        type: weather_glyph
        x: "temp_glyph.left"
        y: "precip_glyph.bottom + 1"
        width: "20"
        height: "20"
        fg_color: Cyan
      - name: pressure
        type: label
        x: "temperature.left"
        y: "pressure_glyph.top"
        width: "temperature.width"
        height: "11"
        font: font_6x10
        fg_color: Cyan
      # Astral block — rows chained with no gap, 20x20 glyphs
      - name: sunrise_glyph
        type: weather_glyph
        x: "temp_glyph.left"
        y: "pressure_glyph.bottom + 2"
        width: "20"
        height: "20"
      - name: sunrise_text
        type: label
        x: "sunrise_glyph.right + 2"
        y: "sunrise_glyph.top"
        width: "33"
        height: "10"
        font: font_5x8
        horizontal_alignment: Center
        fg_color: Yellow
      - name: sunset_glyph
        type: weather_glyph
        x: "sunrise_glyph.left"
        y: "sunrise_glyph.bottom + 2"
        width: "20"
        height: "20"
      - name: sunset_text
        type: label
        x: "sunrise_text.left"
