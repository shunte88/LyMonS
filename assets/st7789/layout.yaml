        x: "album_artist.left"
        y: "artist.bottom+3"
        width: "album_artist.width"
        height: "album_artist.height"
        font: font_7x13
        fg_color: Orange
        horizontal_alignment: Center
        scrollable: true
      # parent.height - 15 = 49 on 64px display (matches: height - 6 - y_height)
      - name: track_progress_bar
        type: track_progress_bar
        x: "status_bar.left"
        y: "parent.height - 19"
        width: "parent.width - 4"
        height: "3"
      # parent.height - 10 = 54 on 64px display (matches: height - 1 - y_height)
      - name: info_line
        type: info_line
        x: "status_bar.left"
        y: "parent.height - 14"
        width: "parent.width - 4"
        height: "14"
        font: font_7x13

