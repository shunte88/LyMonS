        width: "temp_glyph.width"
        height: "temp_glyph.height"
      - name: sunset_text
        type: label
        x: "sunrise_text.left"
        y: "sunset_glyph.top"
        width: "sunrise_text.width"
        height: "sunrise_text.height"
        font: font_6x10
        horizontal_alignment: Center
        fg_color: Yellow
      - name: moonrise_glyph
        type: weather_glyph
        x: "sunrise_text.right + 8"
        y: "pressure_glyph.bottom + 3"
        width: "temp_glyph.width"
        height: "temp_glyph.height"
      - name: moonrise_text
        type: label
        x: "moonrise_glyph.right + 2"
        y: "moonrise_glyph.top"
        width: "sunrise_text.width"
        height: "sunrise_text.height"
        font: font_6x10
        horizontal_alignment: Center
        fg_color: Cyan
      - name: moonset_glyph
        type: weather_glyph
        x: "sunset_text.right + 8"
        y: "sunset_glyph.top"
        width: "temp_glyph.width"
        height: "temp_glyph.height"
      - name: moonset_text
        type: label
        x: "moonset_glyph.right + 2"
        y: "moonset_glyph.top"
        width: "sunset_text.width"
        height: "sunset_text.height"
        font: font_6x10
        horizontal_alignment: Center
        fg_color: Cyan
      # Moonphase — multi-line text below
      # glyph will be centered above this text
      - name: moonphase_text
        type: label
        x: "parent.width - 52"
        y: "precip_glyph.top"
        width: "50"
        height: "22"
        font: font_5x8
        horizontal_alignment: Center
        fg_color: Yellow
      # Moonphase — 42×42 glyph center-justified 
      # with multi-line text below
      - name: moonphase_svg
        type: custom
        x: "moonphase_text.left + 4"
        y: "12"
        width: "42"
        height: "42"
      # Conditions — full-width strip at the bottom of the display
      - name: conditions
        type: label
        x: "2"
        y: "parent.height - 16"
        width: "parent.width - 4"
        height: "13"
        font: font_7x13_bold
        horizontal_alignment: Center
        fg_color: Green

  # Current weather — 40×40 SVG icon left, all data in right column,
  # conditions as a full-width strip at the bottom of the display.
  weather_current_160x80:
    fields:
      # SVG icon — 36×36 top left sector
      - name: weather_icon
        type: weather_icon
        x: "4"
        y: "4"
        width: "34"
        height: "34"
      # Metric rows — 10×10 glyphs, font_5x7 text
      - name: temp_glyph
        type: weather_glyph
        x: "weather_icon.right + 2"
        y: "2"
        width: "10"
        height: "10"
        fg_color: Cyan
      - name: temperature
        type: label
        x: "temp_glyph.right + 2"
        y: "temp_glyph.top"
        width: "parent.width - temp_glyph.right - 2"
        height: "8"
        font: font_5x7
