      - name: moonrise_text
        type: label
        x: "sunrise_text.left"
        y: "moonrise_glyph.top"
        width: "33"
        height: "10"
        font: font_5x8
        horizontal_alignment: Center
        fg_color: Cyan
      - name: moonset_glyph
        type: weather_glyph
        x: "sunrise_glyph.left"
        y: "moonrise_glyph.bottom + 2"
        width: "20"
        height: "20"
      - name: moonset_text
        type: label
        x: "sunrise_text.left"
        y: "moonset_glyph.top"
        width: "33"
        height: "10"
        font: font_5x8
        horizontal_alignment: Center
        fg_color: Cyan
      # Moonphase — multi-line text below
      # glyph will be centered above this text
      - name: moonphase_text
        type: label
        # (120-50)/2
        x: "35"
        y: "parent.height - 46"
        width: "50"
        height: "22"
        font: font_6x10
        horizontal_alignment: Center
        fg_color: Yellow
      # Moonphase — 42×42 glyph center-justified 
