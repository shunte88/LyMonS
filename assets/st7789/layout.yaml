#
#  assets/st7789/layout.yaml
#
#  LyMonS — ST7789 display override (default 300×170 Rgb565)
#  ST7789 display family 320x240, 300×170, 240x240, 280x240, 240x135, 160x80
#
#  Merged on top of assets/layout.yaml at runtime.
#  Only components/templates that differ from the base are defined here.
#
#  Display geometry:
#    300×170 px, full-color Rgb565
#    SVG icon: 150×150 at (0, 10) — vertically centred ((170-150)/2=10)
#    Right column: x=152, width=148
#    Glyph col x=152, text col x=glyph.right+2
#
#  Right column vertical stack (metric block, 20×20 glyphs, 26px pitch):
#    y=6    temperature        (font_7x13_bold, glyph 20×20)
#    y=32   humidity           (font_7x13_bold, glyph 20×20)
#    y=58   wind               (font_7x13_bold, glyph 20×20)
#    y=84   precipitation      (font_7x13_bold, glyph 20×20)
#    y=84   pressure           (font_7x13_bold, glyph 20×20)
#    y=106  astral block — sunrise/sunset/moonrise/moonset chained at no gap
#    y=154  conditions strip   (font_7x13_bold, full width)
#
#  Moonphase: 42×42 glyph at right edge (x=parent.width-46),
#             50px multi-line text centered below glyph.
#

components:

  egg_tracks_240x135:
    fields:
      # combination text is not needed here - move out of bounds
      - name: combination
        type: label
        x: "display.width+10"
        y: "-10"
      - name: artist
        type: label
        x: "40 + display.width/2"
        y: "10"
        width: "display.width/2 - 40"
        height: "30"
        font: font_6x9
        horizontal_alignment: Center
        fg_color: Cyan
      - name: title
        type: label
        x: "artist.left"
        y: "artist.bottom"
        width: "artist.width"
        height: "artist.height"
        font: font_6x9
        horizontal_alignment: Center
        fg_color: Cyan
      - name: album
        type: label
        x: "artist.left"
        y: "title.bottom"
        width: "artist.width"
        height: "artist.height"
        font: font_6x9
        horizontal_alignment: Center
        fg_color: Cyan
      - name: year
        type: label
        x: "artist.left"
        y: "album.bottom"
        width: "artist.width"
        height: "artist.height/2"
        font: font_6x9
        horizontal_alignment: Center
        fg_color: Cyan
      - name: time
        type: label
        x: "display.width - 43"
        y: "display.height - 14"
        width: "41"
        height: "13"
        font: font_7x13
        horizontal_alignment: Right
        fg_color: Yellow

  egg_tracks_240x240:
    fields:
      # combination text is not needed here - move out of bounds
      - name: combination
        type: label
        x: "display.width+10"
        y: "-10"
      - name: artist
        type: label
        x: "2"
        y: "display.height - 75"
        width: "display.width - 4"
        height: "14"
        font: font_7x13_bold
        horizontal_alignment: Center
        fg_color: Orange
      - name: title
        type: label
        x: "artist.left"
        y: "artist.bottom"
        width: "artist.width"
        height: "artist.height"
        font: font_7x13_bold
        horizontal_alignment: Center
        fg_color: Orange
      - name: album
