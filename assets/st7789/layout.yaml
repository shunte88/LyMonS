  # Current weather — 120×120 SVG icon left, all data in right column,
  # conditions as a full-width strip at the bottom of the display.
  weather_current_240x240:
    fields:
      # SVG icon — 120×120 vertically centered
      - name: weather_icon
        type: weather_icon
