#
#  assets/layout.yaml
#
#  LyMonS — Declarative layout templates
#
#  Defines reusable components and page templates evaluated at runtime by
#  layout_resolver::LayoutResolver against a concrete DisplayProfile.
#
#  Expression variables available in component fields:
#    display.width  display.height   — full display dimensions
#    parent.width   parent.height    — region dimensions allocated by the template
#    font_height                     — character_size.height of the field's font (0 if none)
#    <name>.top  .bottom  .left  .right  .width  .height  — prior field geometry
#
#  Arithmetic: + - * / with integer truncation; parentheses; unary minus.
#
#  Geometry notes (base profile: 128×64 monochrome):
#    y_height = 9, border_adj = 2
#    status_bar occupies y=2..11; first scroller row at y=12 (1px gap)
#    progress bar at y=49 (parent.height - 15), info_line at y=54 (parent.height - 10)
#

components:

  # Scroller panel — status bar + 4 scrolling text rows + progress bar + info line.
  # Fills any region; parent.width/height drive all expressions.
  scroller_panel:
    fields:
      - name: status_bar
        type: status_bar
        x: "2"
        y: "2"
        width: "parent.width - 4"
        height: "9"
        font: font_4x6

      - name: album_artist
        type: scrolling_text
        x: "status_bar.left"
        y: "status_bar.bottom + 1"
        width: "parent.width - 4"
        height: "9"
        font: font_5x8
        fg_color: Cyan
        scrollable: true

      - name: album
        type: scrolling_text
        x: "album_artist.left"
        y: "album_artist.bottom + 1"
        width: "album_artist.width"
        height: "album_artist.height"
        font: font_5x8
        fg_color: Cyan
        scrollable: true

      - name: title
        type: scrolling_text
        x: "album_artist.left"
        y: "album.bottom + 1"
        width: "album_artist.width"
        height: "album_artist.height"
        font: font_5x8
        fg_color: Cyan
        scrollable: true

      - name: artist
        type: scrolling_text
        x: "album_artist.left"
        y: "title.bottom + 1"
        width: "album_artist.width"
        height: "album_artist.height"
        font: font_5x8
        fg_color: Cyan
        scrollable: true

      # parent.height - 15 = 49 on 64px display (matches: height - 6 - y_height)
      - name: track_progress_bar
        type: track_progress_bar
        x: "status_bar.left"
        y: "parent.height - 15"
        width: "parent.width - 4"
        height: "3"

      # parent.height - 10 = 54 on 64px display (matches: height - 1 - y_height)
      - name: info_line
        type: info_line
        x: "status_bar.left"
        y: "parent.height - 10"
        width: "parent.width - 4"
        height: "10"
        font: font_5x8

  # Scroller panel — status bar + 4 cover art scrolling text rows + progress bar + info line.
  # Fills any region; parent.width/height drive all expressions.
  scroller_art_panel:
    fields:
      - name: status_bar
        type: status_bar
        x: "2"
        y: "2"
        width: "parent.width - 4"
        height: "20"

      - name: cover_art
        type: custom
        x: "status_bar.left"
        y: "status_bar.bottom + 1"
        width: "120"
        height: "120"

      - name: album_artist
        type: scrolling_text
        x: "cover_art.right + 2"
        y: "status_bar.bottom + 1"
        width: "parent.width - cover_art.width - 4"
        height: "9"
        font: font_5x8
        scrollable: true

      - name: album
        type: scrolling_text
        x: "album_artist.left"
        y: "album_artist.bottom+1"
        width: "album_artist.width"
        height: "album_artist.height"
        font: font_5x8
        scrollable: true

      - name: title
        type: scrolling_text
        x: "album_artist.left"
        y: "album.bottom+1"
        width: "album_artist.width"
        height: "album_artist.height"
        font: font_5x8
        scrollable: true

      - name: artist
        type: scrolling_text
        x: "album_artist.left"
        y: "title.bottom+1"
        width: "album_artist.width"
        height: "album_artist.height"
        font: font_5x8
        scrollable: true

      # parent.height - 15 = 49 on 64px display (matches: height - 6 - y_height)
      - name: track_progress_bar
        type: track_progress_bar
        x: "status_bar.left"
        y: "parent.height - 15"
        width: "parent.width - 4"
        height: "3"

      # parent.height - 10 = 54 on 64px display (matches: height - 1 - y_height)
      - name: info_line
        type: info_line
        x: "status_bar.left"
        y: "parent.height - 10"
        width: "parent.width - 4"
        height: "10"
        font: font_5x8

  # Warning/error panel — alert icon centred above message text.
  # Used when the LMS server is unavailable or player is not found.
  warning_panel:
    fields:
      - name: warn_icon
        type: custom
        x: "parent.width/2 - 6"
        y: "4"
        width: "12"
        height: "12"

      - name: warn_title
        type: label
        x: "2"
        y: "warn_icon.bottom + 2"
        width: "parent.width - 4"
        height: "9"
        font: font_5x8
        horizontal_alignment: Center
        fg_color: Yellow

      - name: warn_detail
        type: label
        x: "2"
        y: "warn_title.bottom + 1"
        width: "parent.width - 4"
        height: "9"
        font: font_5x8
        horizontal_alignment: Center
        fg_color: White

      - name: retry_info
        type: label
        x: "2"
        y: "parent.height - 10"
        width: "parent.width - 4"
        height: "9"
        font: font_4x6
        horizontal_alignment: Center
        fg_color: Cyan

  # AIO compact panel — placed in the left half of the display.
  # Compact status bar, wall clock, track times, progress bar, and a combination
  # scroller that spans the full display width (display.width, not parent.width).
  aio_compact_panel:
    fields:
      - name: status_bar_small
        type: status_bar_small
        x: "2"
        y: "2"
        width: "parent.width - 4"
        height: "9"
        font: font_6x9

      # x=29 matches the time_adj constant in the legacy layout manager
      - name: current_time
        type: label
        x: "status_bar_small.left + 27"
        y: "status_bar_small.bottom + 11"
        width: "parent.width - 31"
        height: "14"
        font: font_7x13_bold

      - name: duration_time
        type: label
        x: "current_time.left"
        y: "current_time.bottom + 1"
        width: "current_time.width"
        height: "current_time.height"
        font: font_7x13_bold

      - name: track_time
        type: label
        x: "current_time.left"
        y: "duration_time.bottom + 1"
        width: "current_time.width"
        height: "current_time.height"
        font: font_7x13_bold

      # parent.height - 14 = 50 on 64px display (matches: height - 5 - y_height)
      - name: track_progress_bar
        type: track_progress_bar
        x: "status_bar.left"
        y: "parent.height - 14"
        width: "display.width - 4"
        height: "3"

      # Spans full display width so the scroller crosses both info and visualizer panels.
      # parent.height - 12 = 52 on 64px display (matches: height - 3 - y_height)
      - name: combination
        type: scrolling_text_combination
        x: "status_bar.left"
        y: "parent.height - 10"
        width: "display.width - 4"
        height: "9"
        font: font_5x8
        scrollable: true

  # Clock face for displays up to 70px tall (digit size 25×44).
  # Layout (64px example): 11px top buffer | 44px digits | 1px gap | 6px metrics | 2px bar = 64px exact.
  # Metrics field is only rendered when --metrics flag is set.
  clock_face_small:
    fields:
      # Digits first so downstream fields can reference clock_digits.bottom.
      - name: clock_digits
        type: clock_digits
        x: "2"
        y: "11"
        width: "25"
        height: "44"

      # System metrics (CPU % and temperature) — rendered in the gap below the digits.
      # font_4x6 (6pt) fits the 6px gap; hidden unless --metrics is active.
      - name: metrics
        type: label
        x: "2"
        y: "clock_digits.bottom + 1"
        width: "parent.width - 4"
        height: "6"
        font: font_4x6
        horizontal_alignment: Center

      # Seconds progress bar — butts up to the bottom of the metrics gap.
      - name: seconds_progress
        type: seconds_progress
        x: "2"
        y: "parent.height - 2"
        width: "parent.width - 4"
        height: "2"

  # Clock face for displays taller than 70px (digit size 60×105).
  # Layout (170px example): 11px top | 105px digits | 2px gap | 8px metrics | 26px open | 18px bar+date zone.
  clock_face_large:
    fields:
      # Digits first so downstream fields can reference clock_digits.bottom.
      - name: clock_digits
        type: clock_digits
        x: "2"
        y: "11"
        width: "60"
        height: "105"

      # System metrics — rendered just below the digits.
      # font_5x8 (8pt) for the taller display.
      - name: metrics
        type: label
        x: "2"
        y: "clock_digits.bottom + 2"
        width: "parent.width - 4"
        height: "8"
        font: font_5x8
        horizontal_alignment: Center

      - name: seconds_progress
        type: seconds_progress
        x: "2"
        y: "parent.height - 18"
        width: "parent.width - 4"
        height: "4"

      - name: date
        type: date
        x: "2"
        y: "parent.height - 12"
        width: "parent.width - 4"
        height: "10"
        font: font_6x10
        horizontal_alignment: Center
        fg_color: Cyan

  # Splash screen — logo SVG full screen with version/build/status text at bottom.
  splash_screen:
    fields:
      - name: logo_svg
        type: custom
        x: "0"
        y: "0"
        width: "parent.width"
        height: "parent.height"

      # version_y = parent.height - 7 - 9 - 15 = parent.height - 31
      - name: version
        type: label
        x: "0"
        y: "parent.height - 31"
        width: "parent.width"
        height: "15"
        font: font_6x13_bold
        horizontal_alignment: Center
        vertical_alignment: Bottom
        fg_color: White

      # build_y = parent.height - 7 - 9 = parent.height - 16
      - name: build_date
        type: label
        x: "0"
        y: "parent.height - 16"
        width: "parent.width"
        height: "7"
        font: font_4x6
        horizontal_alignment: Center
        vertical_alignment: Bottom
        fg_color: Cyan

      # status_y = parent.height - 7
      - name: status
        type: label
        x: "0"
        y: "parent.height - 7"
        width: "parent.width"
        height: "7"
        font: font_4x6
        horizontal_alignment: Center
        vertical_alignment: Bottom
        fg_color: Green

  # this has gotten a tad self referencial
  weather_astral_panel:
    fields:
      - name: noop
        type: label
        x: "-10"
        y: "-10"
        width: "5"
        height: "5"
        font: font_4x6
        horizontal_alignment: Left

  # Current weather page — left side visible on all displays.
  # weather_icon size is display.height/2+2 (=34 on 64px).
  # Metric glyphs and text anchor off weather_icon.right.
  weather_current_main:
    fields:
      - name: weather_icon
        type: weather_icon
        x: "12"
        y: "10"
        width: "display.height/2 + 2"
        height: "display.height/2 + 2"

      - name: temp_glyph
        type: weather_glyph
        x: "weather_icon.right + 6"
        y: "2"
        width: "12"
        height: "12"
        fg_color: Cyan
      - name: temperature
        type: label
        x: "temp_glyph.right + 2"
        y: "2"
        width: "parent.width - temp_glyph.right - 2"
        height: "14"
        font: font_6x13_bold
        fg_color: Cyan
      - name: humidity_glyph
        type: weather_glyph
        x: "temp_glyph.left"
        y: "14"
        width: "12"
        height: "12"
        fg_color: Cyan
      - name: humidity
        type: label
        x: "temperature.left"
        y: "15"
        width: "temperature.width"
        height: "12"
        font: font_5x8
        fg_color: Cyan
      - name: wind_glyph
        type: weather_glyph
        x: "temp_glyph.left"
        y: "24"
        width: "12"
        height: "12"
        fg_color: Cyan
      - name: wind
        type: label
        x: "temperature.left"
        y: "25"
        width: "temperature.width"
        height: "12"
        font: font_5x8
        fg_color: Cyan
      - name: precip_glyph
        type: weather_glyph
        x: "temp_glyph.left"
        y: "34"
        width: "12"
        height: "12"
        fg_color: Cyan
      - name: precipitation
        type: label
        x: "temperature.left"
        y: "35"
        width: "temperature.width"
        height: "12"
        font: font_5x8
        fg_color: Cyan
      # parent.height - 16 = 48 on 64px display
      - name: conditions
        type: label
        x: "2"
        y: "parent.height - 16"
        width: "parent.width - 4"
        height: "14"
        font: font_7x14
        horizontal_alignment: Center
        fg_color: Yellow

  # Forecast 3-column panel — days 1-3, fits any display width.
  weather_forecast_main:
    fields:
      - name: day1_icon
        type: weather_icon
        x: "9"
        y: "1"
        width: "display.width/3 - 18"
        height: "display.width/3 - 18"
      - name: day1_name
        type: label
        x: "1"
        y: "day1_icon.bottom + 2"
        width: "display.width/3"
        height: "10"
        font: font_4x6
        horizontal_alignment: Center
        vertical_alignment: Middle
        fg_color: Cyan
        border: 1
      - name: day1_data_box
        type: custom
        x: "day1_name.left"
        y: "day1_icon.bottom + 11"
        width: "day1_name.width"
        height: "22"
        border: 1
      - name: day1_temp
        type: label
        x: "day1_name.left + 1"
        y: "day1_icon.bottom + 14"
        width: "day1_name.width"
        height: "7"
        font: font_4x6
        horizontal_alignment: Center
        fg_color: Cyan
      - name: day1_precip
        type: label
        x: "day1_name.left + 1"
        y: "day1_icon.bottom + 21"
        width: "day1_name.width"
        height: "day1_temp.height"
        font: font_4x6
        horizontal_alignment: Center
        fg_color: Cyan

      - name: day2_icon
        type: weather_icon
        x: "day1_name.right + 5"
        y: "day1_icon.top"
        width: "day1_icon.width"
        height: "day1_icon.height"
      - name: day2_name
        type: label
        x: "day1_name.right"
        y: "day1_name.top"
        width: "day1_name.width"
        height: "day1_name.height"
        font: font_4x6
        horizontal_alignment: Center
        vertical_alignment: Middle
        fg_color: Cyan
        border: 1
      - name: day2_data_box
        type: custom
        x: "day1_data_box.right"
        y: "day1_data_box.top"
        width: "day1_data_box.width"
        height: "day1_data_box.height"
        border: 1
      - name: day2_temp
        type: label
        x: "day1_name.right + 1"
        y: "day1_temp.top"
        width: "day1_temp.width"
        height: "day1_temp.height"
        font: font_4x6
        horizontal_alignment: Center
        fg_color: Cyan
      - name: day2_precip
        type: label
        x: "day1_name.right + 1"
        y: "day1_precip.top"
        width: "day1_precip.width"
        height: "day1_precip.height"
        font: font_4x6
        horizontal_alignment: Center
        fg_color: Cyan

      - name: day3_icon
        type: weather_icon
        x: "day2_name.right + 5"
        y: "day1_icon.top"
        width: "day1_icon.width"
        height: "day1_icon.height"
      - name: day3_name
        type: label
        x: "day2_name.right"
        y: "day1_name.top"
        width: "day1_name.width"
        height: "day1_name.height"
        font: font_4x6
        horizontal_alignment: Center
        vertical_alignment: Middle
        fg_color: Cyan
        border: 1
      - name: day3_data_box
        type: custom
        x: "day2_data_box.right"
        y: "day1_data_box.top"
        width: "day1_data_box.width"
        height: "day1_data_box.height"
        border: 1
      - name: day3_temp
        type: label
        x: "day2_name.right + 1"
        y: "day1_temp.top"
        width: "day1_temp.width"
        height: "day1_temp.height"
        font: font_4x6
        horizontal_alignment: Center
        fg_color: Cyan
      - name: day3_precip
        type: label
        x: "day2_name.right + 1"
        y: "day1_precip.top"
        width: "day1_precip.width"
        height: "day1_precip.height"
        font: font_4x6
        horizontal_alignment: Center
        fg_color: Cyan


templates:

  # Each template lists variants in priority order; first match wins.
  # An absent or empty `match` block is a catch-all.

  playback:
    variants:
      - name: wide
        match:
          category: [Large, ExtraLarge]
        regions:
          - component: scroller_art_panel
            x: "0"
            y: "0"
            width: "display.width/2"
            height: "display.height"
      - name: default
        regions:
          - component: scroller_panel
            x: "0"
            y: "0"
            width: "display.width"
            height: "display.height"

  aio:
    variants:
      # Wide displays: left half uses the full scroller panel at half width.
      - name: wide
        match:
          category: [Large, ExtraLarge]
        regions:
          - component: scroller_panel
            x: "0"
            y: "0"
            width: "display.width/2"
            height: "display.height"
        fields:
          - name: visualizer_panel
            type: custom
            x: "display.width/2"
            y: "0"
            width: "display.width/2"
            height: "display.height"

      # Narrow displays: left half uses the compact AIO panel.
      - name: narrow
        regions:
          - component: aio_compact_panel
            x: "0"
            y: "0"
            width: "display.width/2"
            height: "display.height"
        fields:
          - name: visualizer_panel
            type: custom
            x: "display.width/2"
            y: "0"
            width: "display.width/2"
            height: "display.height"

  clock:
    variants:
      # ExtraLarge only (e.g. 400×240): tall digit set (60×105).
      - name: large_display
        match:
          category: [ExtraLarge]
        regions:
          - component: clock_face_large
            x: "0"
            y: "0"
            width: "display.width"
            height: "display.height"

      # All other display sizes: standard digit set (25×44).
      - name: small_display
        regions:
          - component: clock_face_small
            x: "0"
            y: "0"
            width: "display.width"
            height: "display.height"

  weather_forecast:
    variants:
      - name: default
        regions:
          - component: weather_forecast_main
            x: "0"
            y: "0"
            width: "display.width"
            height: "display.height"

  weather_current:
    variants:
      # Wide: main fields + astral panel (both regions span full display width).
      - name: wide
        match:
          category: [Large, ExtraLarge]
        regions:
          - component: weather_current_main
            x: "0"
            y: "0"
            width: "display.width"
            height: "display.height"
          - component: weather_astral_panel
            x: "0"
            y: "0"
            width: "display.width"
            height: "display.height"
      - name: default
        regions:
          - component: weather_current_main
            x: "0"
            y: "0"
            width: "display.width"
            height: "display.height"

  splash:
    variants:
      - name: default
        regions:
          - component: splash_screen
            x: "0"
            y: "0"
            width: "display.width"
            height: "display.height"

  warning:
    variants:
      - name: default
        regions:
          - component: warning_panel
            x: "0"
            y: "0"
            width: "display.width"
            height: "display.height"

  # E a s t e r   e g g   o v e r l a y   t e m p l a t e s
  #
  # Each template resolves to a set of text overlay fields drawn on top of the
  # egg SVG animation.  Field kind determines rendering:
  #
  #   type: scrolling_text + scrollable: true  → horizontal scroller
  #   type: label                              → word-wrapped TextBox
  #
  # Supported field names (data binding):
  #   artist, title, album, album_artist, combination, year, time
  #
  # All field positions are literal pixel coordinates for 128×64 mono displays.
  # Override an entire easter_egg_* template in assets/{driver}/layout.yaml
  # to adjust positions for a different display size — no category matching needed.

  easter_egg_bass:
    variants:
      - name: default
        fields:
          - name: artist
            type: scrolling_text
            x: "4"
            y: "4"
            width: "display.width - 8"
            height: "7"
            font: font_4x6
            scrollable: true
          - name: title
            type: scrolling_text
            x: "artist.left"
            y: "artist.bottom"
            width: "artist.width"
            height: "artist.height"
            font: font_4x6
            scrollable: true
          - name: time
            type: label
            x: "80"
            y: "52"
            width: "48"
            height: "12"
            font: font_6x10
            horizontal_alignment: Right

  easter_egg_blackfly:
    variants:
      - name: default
        fields:
          - name: combination
            type: label
            x: "display.width/2 + 14"
            y: "4"
            width: "display.width/2 - 18"
            height: "47"
            font: font_4x6
            horizontal_alignment: Left
          - name: time
            type: label
            x: "display.width - 43"
            y: "display.height - 11"
            width: "43"
            height: "11"
            font: font_6x10
            horizontal_alignment: Right

  easter_egg_cassette:
    variants:
      - name: default
        fields:
          - name: artist
            type: label
            x: "16"
            y: "6"
            width: "display.width - 32"
            height: "6"
            font: font_4x6
            horizontal_alignment: Center
          - name: title
            type: label
            x: "artist.left"
            y: "artist.bottom"
            width: "artist.width"
            height: "artist.height"
            font: font_4x6
            horizontal_alignment: Center

  easter_egg_ibmpc:
    variants:
      - name: default
        fields:
          - name: combination
            type: label
            x: "display.width/2 + 6"
            y: "3"
            width: "display.width/2 - 10"
            height: "47"
            font: font_4x6
            horizontal_alignment: Left
          - name: time
            type: label
            x: "display.width - 43"
            y: "display.height - 11"
            width: "43"
            height: "11"
            font: font_6x10
            horizontal_alignment: Right

  easter_egg_moog:
    variants:
      - name: default
        fields:
          - name: combination
            type: label
            x: "display.width/2 + 19"
            y: "3"
            width: "display.width/2 - 23"
            height: "47"
