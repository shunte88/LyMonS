            height: "display.height"

  # Easter egg layout overrides for SSD1322 / SH1122 (256×64)
  #
  #  Each entry replaces the 128×64 base template entirely.  Adjust x / y /
  #  width / height to match the actual artwork once tested on hardware.
  #
  #  Right-strip x values below are approximately double the 128px originals
  #  (SVG scales to fill the display width).

  # bass guitar - validated
  easter_egg_bass:
    variants:
      - name: default
        fields:
          # combination text is not needed here - move out of bounds
          - name: combination
            type: label
            x: "display.width+10"
            y: "-10"
          - name: artist
            type: scrolling_text
            x: "4"
            y: "4"
            width: "display.width - 8"
            height: "7"
            font: font_4x6
            fg_color: Cyan
            scrollable: true
          - name: title
            type: scrolling_text
            x: "artist.left"
            y: "artist.bottom"
            width: "artist.width"
            height: "artist.height"
            font: font_4x6
            fg_color: Cyan
            scrollable: true
